name: security-adversarial-tests

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"
  pull_request:
    paths:
      - "app/api/chat/route.ts"
      - "lib/**"
      - "config/security-patterns.json"
      - ".github/workflows/security-adversarial-tests.yml"
  push:
    branches:
      - main
    paths:
      - "app/api/chat/route.ts"
      - "lib/**"
      - "config/security-patterns.json"
      - ".github/workflows/security-adversarial-tests.yml"

jobs:
  adversarial-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run adversarial prompt-security tests
        run: pnpm -s exec vitest run lib/security-patterns.test.ts lib/mcp-tool-security.test.ts lib/llm-guard.test.ts
